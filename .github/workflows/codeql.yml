name: codeql

# CodeQL static analysis (SAST) with data-flow and taint analysis.
# Findings surface in the repository's Security → Code scanning tab;
# the job does not fail the build on alerts.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 3 * * 1" # weekly Monday 03:23 UTC

permissions:
  contents: read
  security-events: write # required to upload CodeQL results

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: codeql (go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          languages: go
          # Go's CodeQL extractor requires a real compile (build-mode: none
          # is rejected for Go). autobuild runs the module's `go build`.
          build-mode: autobuild
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          category: "/language:go"
